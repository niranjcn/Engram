[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[headers]]
  for   = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy   = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://*.up.railway.app; frame-ancestors 'none'; form-action 'self'"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
