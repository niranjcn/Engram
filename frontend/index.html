<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:8000 https://*.up.railway.app https://*.netlify.app; form-action 'self'">
    <title>Engram</title>
    <link rel="icon" type="image/png" href="/f64041cf-6073-4509-b016-45f2143866e2.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0B0D12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var reloaded = false;
        window.addEventListener('error', function(e) {
          if (reloaded) return;
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            reloaded = true;
            e.preventDefault();
            window.location.reload();
          }
        });
        window.addEventListener('unhandledrejection', function(e) {
          if (reloaded) return;
          if (e.reason && e.reason.message && e.reason.message.indexOf('Failed to fetch dynamically imported module') !== -1) {
            reloaded = true;
            window.location.reload();
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
